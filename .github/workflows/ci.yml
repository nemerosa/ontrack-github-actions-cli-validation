name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency: "ci-${{ github.ref }}"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: 'https://npm.pkg.github.com'
          scope: '@nemerosa'

      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: npm run lint

      - run: npm run build

      - id: npm-test
        run: npm test

      - name: Yontrack configuration
        if: github.repository_owner == 'nemerosa' && vars.ONTRACK_URL != ''
        id: yontrack-config
        uses: nemerosa/ontrack-github-actions-cli-config@v1.3.0
        env:
          YONTRACK_URL: ${{ vars.ONTRACK_URL }}
          YONTRACK_TOKEN: ${{ secrets.ONTRACK_TOKEN }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build validation (self-test)
        if: github.repository_owner == 'nemerosa' && vars.ONTRACK_URL != '' && !cancelled()
        uses: ./
        with:
          logging: true
          validation: BUILD
          status: ${{ steps.npm-test.outcome == 'success' && 'PASSED' || 'FAILED' }}

      - name: Semantic release
        id: release
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          npx semantic-release
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update floating major/minor tags
        if: ${{ github.ref == 'refs/heads/main' && steps.release.outputs.version != '' }}
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          [[ "$VERSION" =~ ^v([0-9]+)\.([0-9]+)\.[0-9]+$ ]] || exit 0
          MAJOR="v${BASH_REMATCH[1]}"
          MINOR="v${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
          git tag -f "$MAJOR" "$VERSION"
          git tag -f "$MINOR" "$VERSION"
          git push origin -f "$MAJOR" "$MINOR"

      - name: Released validation (self-test)
        if: github.repository_owner == 'nemerosa' && vars.ONTRACK_URL != '' && !cancelled() && github.ref == 'refs/heads/main' && steps.release.outputs.version != ''
        uses: ./
        with:
          logging: true
          validation: RELEASE
          status: PASSED
